    var hasDaily=data.some(function(d){return d.日度数据&&Object.keys(d.日度数据).length>0});
    var cols=['姓名','月度值','达成率','状态'];
    if(hasQty) cols=hasQty?(data[0]&&data[0].成交量!==undefined?['姓名','月度值','达成率','成交量','超时量','状态']:['姓名','月度值','达成率','派单量','超时量','状态']):cols;
    if(hasDaily) cols.push('日度数据');
    cols.push('建议');
    var h='<table><thead><tr>';cols.forEach(function(c){h+='<th>'+c+'</th>'});h+='</tr></thead><tbody>';
    data.forEach(function(d){
      var pct=d.月度达成率?parseFloat(d.月度达成率.replace(/[^0-9.-]/g,'')):null;
      var ok=d.警示!==undefined?!d.警示:d.ok;
      var pctCls=pct>=95?'pct-good':(pct>=60?'pct-mid':'pct-bad');
      h+='<tr><td class="name-cell">'+d.name+'</td>';
      h+='<td class="val">'+(d.月度值!=null?(d.月度值*100).toFixed(2)+'%':'-')+'</td>';
      h+='<td class="val"><span class="pct '+pctCls+'">'+(d.月度达成率||'-')+'</span></td>';
      if(hasQty){
        h+='<td>'+(d.派单量!==undefined?d.派单量:d.成交量)+'</td>';
        h+='<td>'+(d.超时量!=null?d.超时量:'-')+'</td>';
      }
      h+='<td><span class="status '+(ok?'status-ok':'status-bad')+'">'+(ok?'✓':'✗')+'</span></td>';
      if(hasDaily){
        h+='<td style="font-size:11px;text-align:left">';
        if(d.日度数据){
          var dates=Object.keys(d.日度数据).sort().reverse().slice(0,7);
          dates.forEach(function(dt){
            var v=d.日度数据[dt];
            h+='<span class="status '+(v!=null&&v!=='-'?'status-bad':'status-ok')+'" style="margin:1px;font-size:10px">'+dt.slice(5)+' '+(v!=null&&v!=='-'?(v*100).toFixed(1)+'%':'-')+'</span>';
          });
        }
        h+='</td>';
      }
      h+='<td><span class="advice" title="'+(d.建议||'')+'">'+((d.建议||'').slice(0,15)||'-')+'</span></td>';
      h+='</tr>';
    });
    h+='</tbody></table>';
    wrap.innerHTML=h;div.appendChild(wrap);c.appendChild(div);
  });
}
render();
</script>
</body>
</html>
