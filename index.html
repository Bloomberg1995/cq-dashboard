<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}

.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:20px 24px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px;font-weight:600;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.85}

.toolbar{background:#fff;padding:12px 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:72px;z-index:199;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.toolbar label{font-size:14px;font-weight:500;color:#555;white-space:nowrap}
.toolbar select{padding:6px 30px 6px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;background:#fff;cursor:pointer;outline:none}
.toolbar select:focus{border-color:#1a237e;box-shadow:0 0 0 2px rgba(26,35,126,.15)}
.toolbar .info{font-size:13px;color:#888}

.nav-bar{background:#fff;padding:10px 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:118px;z-index:198;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.nav-bar span.label{font-size:13px;color:#888;font-weight:500;white-space:nowrap}
.nav-bar button{padding:5px 14px;border:1px solid #d0d0d0;border-radius:14px;background:#fafafa;font-size:12.5px;color:#555;cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-bar button:hover{background:#e8eaf6;border-color:#7986cb;color:#1a237e}
.nav-bar button.active{background:#1a237e;color:#fff;border-color:#1a237e}

.main{max-width:1600px;margin:0 auto;padding:20px 24px 40px}

/* 板块表格 */
.section{background:#fff;border-radius:10px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);scroll-margin-top:166px}
.section-title{padding:14px 18px;font-size:15px;font-weight:600;color:#1a237e;border-bottom:2px solid #e8eaf6;display:flex;align-items:center;justify-content:space-between;background:#fafbff}
.section-title .target{font-size:12px;color:#666;font-weight:400;background:#f5f5f5;padding:2px 10px;border-radius:10px}

.table-wrap{overflow-x:auto;max-height:620px;overflow-y:auto;position:relative}

table{width:100%;border-collapse:collapse;min-width:100%;font-size:13px}

/* 表头行 */
thead tr:first-child th{position:sticky;top:0;z-index:10;background:#eef1f8;color:#444;font-size:12px;font-weight:600;text-align:center;padding:8px 5px;border-bottom:2px solid #c5cae9;white-space:nowrap}
thead tr:first-child th:first-child{max-width:70px;overflow:hidden}
thead tr:first-child th:nth-child(2){max-width:100px;overflow:hidden}
thead tr:first-child th:first-child{left:0;z-index:11}

/* 重庆行 */
thead tr.cq-row th{position:sticky;top:30px;z-index:9;font-size:11.5px;font-weight:500;padding:7px 5px;
  background:linear-gradient(180deg,#fff8e1,#fff3cd);color:#795548;border-bottom:2px solid #ffe0b2;text-align:center}
thead tr.cq-row th:first-child{left:0;z-index:10}
thead tr.cq-row th.cq-label{color:#e65100;font-weight:600}

th.col-group{background:#ede7f6;color:#4527a0;font-size:11px;padding:8px 3px}
/* Horizontal table: compact name + data col group */
.section th:first-child,.section td:first-child{max-width:65px;overflow:hidden;text-overflow:ellipsis}
.table-wrap table{font-size:12px}

tbody td{padding:8px 5px;border-bottom:1px solid #eee;text-align:center;vertical-align:middle;white-space:nowrap;font-size:12.5px}
tbody td:first-child{position:sticky;left:0;background:#fff;z-index:5;font-weight:500;text-align:left;padding:8px 6px 8px 10px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody td:nth-child(2):not(.col-group){
  max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
tbody tr:hover td{background:#f8f9ff}
tbody tr:hover td:first-child{background:#f0f2ff}

/* 进度条 */
.progress-bar{width:56px;height:15px;background:#e0e0e0;border-radius:7px;overflow:hidden;display:inline-block;vertical-align:middle}
.progress-fill{height:100%;border-radius:7px;transition:width .3s;min-width:0}
.progress-ok{background:linear-gradient(90deg,#43a047,#66bb6a)}
.progress-warn{background:linear-gradient(90deg,#fb8c00,#ffa726)}
.progress-bad{background:linear-gradient(90deg,#e53935,#ef5350)}
.pct-num{font-size:11px;font-weight:700;margin-left:5px;min-width:28px;display:inline-block;text-align:left}
.pct-ok{color:#2e7d32}.pct-warn{color:#e65100}.pct-bad{color:#c62828}
.pct-good{color:#2e7d32;font-weight:600}
/* Ranking */
.rank-top{color:#d4a017}.rank-mid{color:#e65100}.rank-low{color:#999}
.pct-mid{color:#ef6c00;font-weight:600}
.val-good{color:#2e7d32}
.val-bad{color:#c62828;font-weight:600}
.bar-good{background:linear-gradient(90deg,#66bb6a,#43a047)}
.bar-mid{background:linear-gradient(90deg,#ffb74d,#fb8c00)}
.bar-bad{background:linear-gradient(90deg,#ef5350,#c62828)}
.status-good{border-left-color:#43a047!important}
.status-mid{border-left-color:#fb8c00!important}
.status-bad{border-left-color:#c62828!important}
.status-unknown{border-left-color:#999!important}
.val-ok{color:#2e7d32;font-weight:500}.val-warn{color:#e65100;font-weight:500}.val-bad{color:#c62828;font-weight:500}

/* 聚合表 */
.agg-table thead th{background:#1a237e;color:#fff;border-color:#3949ab}
.agg-table tbody tr:nth-child(even) td{background:#fafbff}
.agg-table tbody tr:hover td{background:#e8eaf6}

/* ====== 急需改善模块（达成率<95%）====== */
.alert-section{background:#fff;border-radius:10px;margin-bottom:20px;overflow:hidden;box-shadow:0 2px 8px rgba(229,57,53,.15);border:1px solid #ffcdd2}
.alert-title{background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:14px 18px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.alert-title .count{background:rgba(255,255,255,.25);padding:2px 10px;border-radius:10px;font-size:13px}

.alert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;padding:16px}

.alert-card{background:#fff5f5;border:1px solid #ffcdd2;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.alert-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:#e53935;border-radius:4px 0 0 4px}
.alert-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.alert-card-indicator{font-size:14px;font-weight:600;color:#c62828}
.alert-card-section{font-size:11px;color:#999}
.alert-card-values{display:flex;gap:16px;align-items:center;margin-bottom:6px}
.alert-card-values .current{font-size:22px;font-weight:700;color:#c62828}
.alert-card-values .target-label{font-size:11px;color:#888}
.alert-card-values .target-val{font-size:13px;color:#555;font-weight:500}
.alert-card-values .pct-badge{font-size:13px;color:#c62828;font-weight:600}
.alert-card-advice{margin-top:8px;padding:10px 12px;background:#fff;border-radius:6px;font-size:12px;color:#555;line-height:1.6;border:1px dashed #ffcdd2}
.alert-card-advice::before{content:'💡 改善建议：';font-weight:600;color:#e65100;display:block;margin-bottom:2px}

/* ====== 重庆卡片视图（可点击）====== */
.cq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.cq-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid #ccc;cursor:pointer;transition:transform .15s,box-shadow .15s}
.cq-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.cq-card.danger{border-left-color:#e53935;background:#fff5f5}
.cq-card.warning{border-left-color:#fb8c00;background:#fff8f0}
.cq-card.ok{border-left-color:#43a047;background:#f1f8f1}
.cq-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cq-card-name{font-size:15px;font-weight:600;color:#333}
.cq-card-section{font-size:11px;color:#999}
.cq-card-body{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.cq-card-value{font-size:30px;font-weight:700}
.cq-card-value.danger{color:#c62828}
.cq-card-value.warning{color:#e65100}
.cq-card-value.ok{color:#2e7d32}
.cq-card-meta{font-size:11px;color:#888}
.cq-card-target{font-size:12px;color:#666;margin-bottom:8px}
.cq-card-target span{background:#f5f5f5;padding:1px 8px;border-radius:8px;margin-left:4px}
.cq-card-hint{font-size:11px;color:#aaa;text-align:right;margin-top:4px}

/* ====== 二级弹窗明细 ====== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:900;justify-content:center;align-items:flex-start;overflow-y:auto;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;width:95%;max-width:1200px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);position:relative}
.modal-head{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:12px 12px 0 0}
.modal-head h2{font-size:17px;font-weight:600}
.modal-close{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:0 4px;line-height:1;opacity:.8}
.modal-close:hover{opacity:1}
.modal-body{padding:16px 20px 20px}

@media(max-width:768px){
  .header h1{font-size:17px}
  .toolbar{padding:8px 12px}
  .main{padding:10px 10px 24px}
  .alert-grid{grid-template-columns:1fr}
  .cq-grid{grid-template-columns:1fr}
  .modal-box{width:98%}
}

.core-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.core-card{background:#fff;border-radius:10px;padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid #e0e0e0;position:relative;overflow:hidden;}
.core-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.core-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.core-good::before{background:#2e7d32;}.core-warn::before{background:#e65100;}.core-bad::before{background:#c62828;}

/* ====== 总结卡片 ====== */
.summary-card{background:linear-gradient(135deg,#fafafa,#f5f5f5);border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:16px 24px;align-items:center}
.summary-card .sc-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;flex-shrink:0}
.summary-card .sc-avatar.good{background:linear-gradient(135deg,#43a047,#66bb6a)}
.summary-card .sc-avatar.mid{background:linear-gradient(135deg,#fb8c00,#ffa726)}
.summary-card .sc-avatar.bad{background:linear-gradient(135deg,#e53935,#ef5350)}

.summary-card .sc-title{font-size:18px;font-weight:700;color:#222;margin-bottom:4px}
.summary-card .sc-sub{font-size:12px;color:#888;margin-bottom:8px}
.summary-card .sc-stats{display:flex;gap:12px;flex-wrap:wrap}
.summary-card .sc-stat{text-align:center;background:#fff;border-radius:8px;padding:6px 14px;min-width:60px;border:1px solid #e8e8e8}
.summary-card .sc-stat-num{font-size:22px;font-weight:700;display:block;line-height:1.2}
.summary-card .sc-stat-label{font-size:11px;color:#888}
.summary-card .sc-stat-num.good{color:#2e7d32}
.summary-card .sc-stat-num.warn{color:#e65100}
.summary-card .sc-stat-num.bad{color:#c62828}
.summary-card .sc-bar-wrap{width:100%;display:flex;height:8px;border-radius:4px;overflow:hidden;background:#eee;margin-top:6px}
.summary-card .sc-bar-seg{height:100%;transition:width .3s}
.summary-card .sc-bar-seg.bad{background:#e53935}
.summary-card .sc-bar-seg.warn{background:#fb8c00}
.summary-card .sc-bar-seg.good{background:#43a047}

.core-card-header{font-size:14px;font-weight:600;color:#333;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0;}

.core-card-footer{font-size:12px;color:#999;padding-top:6px;border-top:1px solid #f5f5f5;}
#modalOverlay2{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;justify-content:center;align-items:center;}

#modalBox2{background:#fff;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.2);}
#modalHeader2{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fafafa;border-radius:12px 12px 0 0;}
#modalTitle2{font-size:16px;font-weight:700;color:#222;}
#modalClose2{background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0 4px;}
#modalClose2:hover{color:#333;}
#modalBody2{padding:20px;}

</style>

function fmtVal(v){
  if(v==null||v===undefined||isNaN(v)) return '-';
  var p=parseFloat(v);
  if(p===0) return '0%';
  if(Math.abs(p)>=3) return p.toFixed(3);
  return (p*100).toFixed(1)+'%';
}

function fmtPct(v){
  if(v==null||v===undefined||isNaN(v)) return '-';
  var p=parseFloat(v);
  return p.toFixed(0)+'%';
}

function pctCls(p){
  if(p==null||p===undefined||isNaN(p)) return '';
  var tp=D.time_progress||0.16;
  if(p>=tp*100) return 'pct-good';
  return 'pct-bad';
}

function valCls(ok){
  return ok ? 'val-good' : 'val-bad';
}

function barCls(p){
  if(p==null||p===undefined||isNaN(p)) return '';
  var tp=D.time_progress||0.16;
  if(p>=tp*100) return 'bar-good';
  return 'bar-bad';
}

function barW(p){
  if(p==null||p===undefined||isNaN(p)) return 0;
  if(p<0) return 0;
  if(p>100) return 100;
  return p;
}

function buildNav(){
  var bar=document.getElementById('navBar');
  bar.innerHTML='<span class="label">⚡ 快速跳转：</span>';
  // 排名按钮
  if(D.ranking&&D.ranking.length>0){
    var rBtn=document.createElement('button');
    rBtn.textContent='🏆 排名';
    rBtn.onclick=function(){
      var el=document.getElementById('rank_section');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
      document.querySelectorAll('#navBar button').forEach(function(b){b.classList.remove('active')});
      rBtn.classList.add('active');
      setTimeout(function(){rBtn.classList.remove('active')},2000);
    };
    bar.appendChild(rBtn);

          h+='<td>'+(row['普通单加单占比']!==undefined?fmtPct(Math.round(row['普通单加单占比']*100)):'-')+'</td>';
          h+='<td>'+(row['一站式加单量']!==undefined?row['一站式加单量']:'-')+'</td>';
          h+='<td>'+(row['一站式加单占比']!==undefined?fmtPct(Math.round(row['一站式加单占比']*100)):'-')+'</td>';
          h+='<td>'+(row['企微加单量']!==undefined?row['企微加单量']:'-')+'</td>';
          h+='<td>'+(row['企微加单占比']!==undefined?fmtPct(Math.round(row['企微加单占比']*100)):'-')+'</td>';
        }
        if(row.daily&&row.daily.length>0){
          row.daily.forEach(function(d){h+='<td class="'+(d.ok?'':'val-bad')+'">'+d.val+'</td>'});
        }
        h+='</tr>';
      });
    }
    h+='</tbody></table></div></div>';
  });
  document.getElementById('mainContent').innerHTML=h;
}

// ========== 单人模式 ==========
function renderSingle(person){
  var all=[];
  D.sections.forEach(function(sec){
    if(sec.type==='horizontal'){
      sec.rows.filter(function(r){return r.name===person}).forEach(function(row){
        row.cols.forEach(function(col){all.push({
          section:sec.name,indicator:col.name,target:col.target,
          value:fmtVal(col.value),ok:col.ok,pct:col.pct,advice:col.advice||''
        })});
      });
    }else{
      sec.rows.filter(function(r){return r.name===person}).forEach(function(row){all.push({
        section:sec.name,indicator:row.indicator,target:row.target,
        value:fmtVal(row.monthly),ok:row.ok,pct:row.pct,
        advice:row.advice||'',daily:row.daily||[]
      })});
    }
  });

  var hasDaily=all.some(function(r){return r.daily&&r.daily.length>0});
  var dates=[];
  if(hasDaily){
    var rd=all.filter(function(r){return r.daily&&r.daily.length>0})[0];
    dates=rd?rd.daily.map(function(d){return d.date}):[];
  }

    var h='';

  // === 排名卡（顶部） ===
  var rnkData=D.ranking||[];
  var myRank=null;
  for(var ri=0;ri<rnkData.length;ri++){
    if(rnkData[ri].name===person){myRank=rnkData[ri];break;}
  }
  if(myRank){
    var rkCls=myRank.rank<=3?'rank-top':myRank.rank<=10?'rank-mid':'rank-low';
    var storeBar=Math.min(myRank.store_score,100);
    var addonBar=Math.min(myRank.addon_score,100);
    h+='<div class="summary-card" style="background:linear-gradient(135deg,#e8eaf6,#c5cae9);margin-bottom:12px;border:1px solid #9fa8da">';
    h+='<div class="sc-body" style="width:100%">';
    h+='<div class="sc-title" style="font-size:15px">🏆 核心指标排名 — <span class="'+rkCls+'">第'+myRank.rank+'名 / 共'+rnkData.length+'人</span></div>';
    h+='<div class="sc-sub" style="display:flex;justify-content:space-between;flex-wrap:wrap;margin-top:8px">';
    h+='<span><strong>综合得分：</strong><span class="'+rkCls+'" style="font-size:16px;font-weight:700">'+myRank.score+'分</span></span>';
    var sv=myRank.store_val!==null&&myRank.store_val!==undefined?myRank.store_val:0;
    h+='<span style="display:inline-flex;align-items:center;gap:6px"><span style="white-space:nowrap">🏪 ¥'+sv.toLocaleString()+' → '+myRank.store_score+'分</span><div class="progress-bar" style="width:60px;height:6px"><div class="progress-fill '+(myRank.store_score>=50?'bar-good':'bar-bad')+'" style="width:'+storeBar+'%;height:6px"></div></div></span>';
    var av=myRank.addon_val!==null&&myRank.addon_val!==undefined?myRank.addon_val:0;
    h+='<span style="display:inline-flex;align-items:center;gap:6px"><span style="white-space:nowrap">➕ '+av+'% → '+myRank.addon_score+'分</span><div class="progress-bar" style="width:60px;height:6px"><div class="progress-fill '+(myRank.addon_score>=50?'bar-good':'bar-bad')+'" style="width:'+addonBar+'%;height:6px"></div></div></span>';
    h+='</div></div></div>';
  }

  // === 总结卡片 ===
  var good=all.filter(function(r){return r.pct!==null&&r.pct!==undefined&&r.pct>=100});
  var warn=all.filter(function(r){return r.pct!==null&&r.pct!==undefined&&r.pct>=96&&r.pct<100});
  var bad=all.filter(function(r){return r.pct!==null&&r.pct!==undefined&&r.pct<96});
  var validPct=all.filter(function(r){return r.pct!==null&&r.pct!==undefined});
  var avgPct=validPct.length>0?Math.round(validPct.reduce(function(a,b){return a+b.pct},0)/validPct.length):0;
  var avatarCls=bad.length>=3?'bad':(bad.length>0?'mid':'good');
  h+='<div class="summary-card">';
  h+='<div class="sc-avatar '+avatarCls+'">'+avgPct+'%</div>';
  h+='<div class="sc-body">';
  h+='<div class="sc-title">📊 '+person+' — 综合概览</div>';
  h+='<div class="sc-sub">共'+all.length+'项考核指标 · 平均达成率'+avgPct+'%</div>';
  h+='<div class="sc-stats">';
  h+='<div class="sc-stat"><span class="sc-stat-num good">'+good.length+'</span><span class="sc-stat-label">✅ 达标</span></div>';
  h+='<div class="sc-stat"><span class="sc-stat-num warn">'+warn.length+'</span><span class="sc-stat-label">🟡 临界</span></div>';
  h+='<div class="sc-stat"><span class="sc-stat-num bad">'+bad.length+'</span><span class="sc-stat-label">🔴 异常</span></div>';
  h+='</div>';
  h+='<div class="sc-bar-wrap"><div class="sc-bar-seg bad" style="width:'+Math.round(bad.length/all.length*100)+'%"></div><div class="sc-bar-seg warn" style="width:'+Math.round(warn.length/all.length*100)+'%"></div><div class="sc-bar-seg good" style="width:'+Math.round(good.length/all.length*100)+'%"></div></div>';
  h+='</div></div>';


  // === 急需改善模块：达成率 < 95% ===
  var bad=all.filter(function(r){return r.pct!==null&&r.pct!==undefined&&r.pct<96});
  if(bad.length>0){
    h+='<div class="alert-section">';
    h+='<div class="alert-title">🚨 急需改善 <span class="count">'+bad.length+'项未达标（达成率&lt;95%）</span></div>';
    h+='<div class="alert-grid">';
    bad.forEach(function(r){
      h+='<div class="alert-card">';
      h+='<div class="alert-card-header"><span class="alert-card-indicator">🔴 '+r.indicator+'</span><span class="alert-card-section">'+r.section+'</span></div>';
      h+='<div class="alert-card-values"><span class="current">'+r.value+'</span><div><div class="target-label">目标</div><div class="target-val">🎯 '+r.target+'</div></div><div class="pct-badge">达成率 '+fmtPct(r.pct)+'</div></div>';
      if(r.advice) h+='<div class="alert-card-advice">'+r.advice+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // === 完整指标表格 ===
  h+='<div class="section"><div class="section-title">📋 '+person+' — 全部指标明细'+(all.length>0?'（共'+all.length+'项）':'')+'</div>';
  h+='<div class="table-wrap"><table class="agg-table"><thead><tr><th>板块</th><th>指标</th><th>目标</th><th>月度达成</th><th>达成率</th>';
  dates.forEach(function(d){h+='<th>'+d+'</th>'});
  h+='</tr></thead><tbody>';

  all.forEach(function(row){
    h+='<tr>';
    h+='<td style="color:#555;text-align:left;white-space:nowrap">'+row.section+'</td>';
    h+='<td style="color:#555;text-align:left;padding-left:12px">'+row.indicator+'</td>';
    h+='<td>'+row.target+'</td>';
    h+='<td class="'+valCls(row.ok)+'">'+row.value+'</td>';
    h+='<td><div class="progress-bar"><div class="progress-fill '+barCls(row.pct)+'" style="width:'+barW(row.pct)+'%"></div></div><span class="pct-num '+pctCls(row.pct)+'">'+fmtPct(row.pct)+'</span></td>';
    if(hasDaily){
      if(row.daily&&row.daily.length>0) row.daily.forEach(function(d){h+='<td class="'+(d.ok?'':'val-bad')+'">'+d.val+'</td>'});
      else dates.forEach(function(){h+='<td>-</td>'});
    }
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';

  document.getElementById('mainContent').innerHTML=h;
}

// ========== 重庆区域总览（可点击卡片）==========
function renderChongqing(){
  var h='';
  // 核心指标置顶
  if(D.chongqing_core_indicators&&D.chongqing_core_indicators.length>0){
    h+='<div style="margin-bottom:24px"><div class="section-title" style="margin-bottom:12px">🏢 区域核心指标 <span style="font-size:13px;color:#999;font-weight:400">（重庆区域月度KPI）</span></div>';
    h+='<div class="core-grid">';
    D.chongqing_core_indicators.sort(function(a,b){return a.pct-b.pct;}).forEach(function(c,idx){
      var tp=D.time_progress||0.16;
      var cls='core-'+(c.pct>=tp*100?'good':'bad');
      h+='<div class="core-card '+cls+'" onclick="openCoreDetail('+idx+')">';
      h+='<div class="core-card-header">'+c.indicator+'</div>';
      h+='<div class="core-card-body">';
      h+='<div class="core-current">'+c.value+'</div>';
      h+='<div class="core-pct-wrap"><span class="core-pct">'+fmtPct(c.pct)+'</span><span class="core-pct-label">达成率</span></div>';
      h+='</div>';
      h+='<div class="core-card-footer">目标：'+c.target+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  h+='<div style="margin-bottom:20px"><div class="section-title" style="margin-bottom:12px">📊 日常运营指标 <span style="font-size:13px;color:#999;font-weight:400">（达成率从低到高排序）</span></div><div class="cq-grid">';
  D.chongqing_cards.forEach(function(c,idx){
    var st=renderStatus(c.value,c.pct);
    var vv=c.value!==null&&c.value!==undefined?fmtVal(c.value):'-';
    h+='<div class="cq-card '+st+'" onclick="openCardDetail('+idx+')">';
    h+='<div class="cq-card-header"><div><div class="cq-card-name">'+c.indicator+'</div><div class="cq-card-section">'+c.section+'</div></div><div style="text-align:right;font-size:12px"><span class="'+pctCls(c.pct)+'" style="font-weight:700;font-size:16px">'+fmtPct(c.pct)+'</span><br><span style="color:#999">达成率</span></div></div>';
    h+='<div class="cq-card-body"><span class="cq-card-value '+st+'">'+vv+'</span><div class="cq-card-meta">区域均值</div></div>';
    h+='<div class="cq-card-target">目标：<span>'+c.target+'</span></div>';
    h+='<div class="cq-card-hint">👆 点击查看人员明细 →</div>';
    h+='</div>';
  });
  h+='</div></div>';
  document.getElementById('mainContent').innerHTML=h;
}
function openCoreDetail(idx){
  var c=D.chongqing_core_indicators[idx];
  document.getElementById('modalTitle2').textContent='🏢 '+c.indicator;
  var h='';
  h+='<div style="padding:12px 16px;background:#f5f5f5;border-radius:8px;margin-bottom:12px">';
  h+='<div style="font-size:18px;font-weight:700;margin-bottom:8px">当前值：'+c.value+'</div>';
  var tp2=D.time_progress||0.16; h+='<div style="font-size:14px;color:#666">目标：'+c.target+' | 达成率：<span class="'+(c.pct>=tp2*100?'pct-good':'pct-bad')+'">'+fmtPct(c.pct)+'</span></div>';
  h+='</div>';
  h+='<div style="font-size:13px;color:#666;padding:12px 0">该指标为重庆区域整体月达成KPI。</div>';
  document.getElementById('modalBody2').innerHTML=h;
  document.getElementById('modalOverlay2').classList.add('show');
}
function closeModal2(e){
  if(e&&e.target!==document.getElementById('modalOverlay2')) return;
  document.getElementById('modalOverlay2').classList.remove('show');
}

// ========== 二级弹窗：某指标的人员明细 ==========
function openCardDetail(cardIdx){
  var card=D.chongqing_cards[cardIdx];
  var indName=card.indicator;
  var secName=card.section;

  document.getElementById('modalTitle').textContent='📊 '+indName+' — 人员明细（'+secName+'）';

  // 从sections中找到对应数据
  var rows=[];
  D.sections.forEach(function(sec){
    if(sec.name!==secName) return;
    if(sec.type==='horizontal'){
      sec.rows.forEach(function(r){
        r.cols.forEach(function(c){
          if(c.name===indName) rows.push({name:r.name,value:c.value,ok:c.ok,pct:c.pct,target:c.target});
        });
      });
    }else{
      sec.rows.filter(function(r){return r.indicator===indName}).forEach(function(r){
        rows.push({name:r.name,value:r.monthly,ok:r.ok,pct:r.pct,target:r.target,daily:r.daily||[]});
      });
    }
  });

  // 按达成率排序（最差在前）
  rows.sort(function(a,b){return (a.pct||100)-(b.pct||100)});

  var hasDaily=rows.some(function(r){return r.daily&&r.daily.length>0});
  var dates=[];
  if(hasDaily){
    var rd=rows.find(function(r){return r.daily&&r.daily.length>0});
    dates=rd?rd.daily.map(function(d){return d.date}):[];
  }

  var h='<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>';
  h+='<th style="text-align:left;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">排名</th>';
  h+='<th style="text-align:left;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">人员</th>';
  h+='<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">目标</th>';
  h+='<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">月度达成</th>';
  h+='<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">达成率</th>';
  dates.forEach(function(d){h+='<th style="text-align:center;padding:8px 10px;background:#eef1f8;border-bottom:2px solid #c5cae9">'+d+'</th>'});
  h+='</tr></thead><tbody>';

  rows.forEach(function(r,idx){
    var cls=r.pct<96?'val-bad':r.pct<100?'val-warn':'val-ok';
    h+='<tr style="border-bottom:1px solid #eee">';
    h+='<td style="padding:8px 10px;text-align:center;font-weight:600;color:#'+(idx<3?(r.pct<96?'c62828':'e65100'):'#999')+'">'+(idx+1)+'</td>';
    h+='<td style="padding:8px 10px;font-weight:500">'+r.name+'</td>';
    h+='<td style="padding:8px 10px;text-align:center;color:#666">'+r.target+'</td>';
    h+='<td style="padding:8px 10px;text-align:center;'+cls+'">'+fmtVal(r.value)+'</td>';
    h+='<td style="padding:8px 10px;text-align:center"><span class="'+pctCls(r.pct)+'" style="font-weight:700">'+fmtPct(r.pct)+'</span></td>';
    if(hasDaily){
      if(r.daily&&r.daily.length>0) r.daily.forEach(function(d){h+='<td style="padding:8px 10px;text-align:center;'+(d.ok?'':'val-bad')+'">'+d.val+'</td>'});
      else dates.forEach(function(){h+='<td style="padding:8px 10px;text-align:center">-</td>'});
    }
    h+='</tr>';
  });

  h+='</tbody></table>';

  // 底部汇总
  h+='<div style="margin-top:16px;padding:12px 16px;background:#f5f5f5;border-radius:8px;font-size:13px">';
  h+='<strong>📋 区域汇总：</strong> 共 '+rows.length+' 人 | ';
  var okCount=rows.filter(function(r){return r.pct>=95}).length;
  h+='<span style="color:#2e7d32;font-weight:600">'+okCount+'人达标(≥95%)</span> | ';
  h+='<span style="color:#c62828;font-weight:600">'+(rows.length-okCount)+'人未达标(&lt;95%)</span> | ';
  h+='区域均值：<strong>'+fmtVal(card.value)+'</strong> (达成率 '+fmtPct(card.pct)+')';
  h+='</div>';

  document.getElementById('modalBody').innerHTML=h;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
}

</script>
