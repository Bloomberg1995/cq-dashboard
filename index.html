*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fa;color:#333;font-size:13px}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 24px;position:sticky;top:0;z-index:200}
.header h1{font-size:18px;font-weight:600}
.header .sub{font-size:12px;opacity:.7;margin-top:2px}
.controls{background:#fff;padding:10px 24px;border-bottom:1px solid #e0e0e0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:55px;z-index:190}
.controls label{font-size:12px;font-weight:500;color:#555}
.controls select{padding:5px 10px;border:1px solid #d0d0d0;border-radius:5px;font-size:12px;min-width:120px}
.controls .info{font-size:11px;color:#888}
.section-nav{background:#fff;padding:6px 24px;display:flex;gap:4px;flex-wrap:wrap;position:sticky;top:90px;z-index:180}
.section-nav button{padding:4px 10px;border:1px solid #d0d0d0;border-radius:12px;background:#fff;font-size:10px;cursor:pointer;white-space:nowrap}
.section-nav button:hover{border-color:#3949ab;color:#3949ab}
.section-nav button.active{background:#3949ab;color:#fff;border-color:#3949ab}
.content{padding:12px 24px 40px;overflow-x:auto}
.mode-hint{font-size:11px;color:#e65100;background:#fff3e0;padding:6px 12px;border-radius:4px;margin-bottom:10px;display:none}

/* 表格 */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06)}
th{background:#f0f2f8;padding:7px 8px;font-size:11px;font-weight:600;color:#444;text-align:left;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:sticky;top:130px;z-index:100}
td{padding:7px 8px;font-size:12px;border-bottom:1px solid #f0f0f0;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#f8f9ff}

/* 行状态色条 */
.row-ok td:first-child{border-left:3px solid #43a047}
.row-warn td:first-child{border-left:3px solid #e65100}
.row-none td:first-child{border-left:3px solid #bbb}

.col-name{font-weight:500}
.col-indicator{color:#444}
.col-target{color:#999;font-size:11px}
.col-monthly{font-weight:500}

/* 进度条 */
.progress-wrap{display:inline-flex;align-items:center;gap:6px;min-width:80px}
.progress-bar{width:60px;height:10px;background:#eee;border-radius:5px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;border-radius:5px;transition:width .3s}
.progress-ok{background:#43a047}
.progress-warn{background:#e65100}
.progress-none{background:#bbb}
.progress-label{font-size:10px;color:#666;white-space:nowrap}

/* 日度单元格 */
.daily-wrap{display:flex;gap:3px}
.daily-cell{padding:2px 5px;border-radius:3px;font-size:10px;min-width:38px;text-align:center}
.daily-good{background:#e8f5e9;color:#2e7d32}
.daily-bad{background:#ffebee;color:#c62828}
.daily-neutral{background:#f5f5f5;color:#999}

/* 单人模式 */
.single-view{display:block}
.single-view .section-block{margin-bottom:12px;background:#fff;border-radius:6px;padding:10px 14px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.single-view .section-block h3{font-size:13px;color:#1a237e;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}

/* 多板块模式 */
.multi-mode .section-block{display:none}
.multi-mode .section-block.active{display:block}

@media(max-width:768px){
.header,.controls,.section-nav,.content{padding-left:12px;padding-right:12px}
.daily-cell{font-size:9px;min-width:30px;padding:1px 3px}
.progress-bar{width:40px}
}
</style>
</head>

function fmt(v){if(v===null||v===undefined)return'-';if(typeof v==='number'){if(v<1&&v>-1)return(v*100).toFixed(1)+'%';return Number.isInteger(v)?v:v.toFixed(1);}return v;}
function fmtPct(p){return p===null||p===undefined?'-':p.toFixed(0)+'%'}

function render(){
  const container=document.getElementById('content');
  const nav=document.getElementById('sectionNav');
  const isSingle=currentPerson!=='__all';
  container.innerHTML='';
  nav.innerHTML='';
  
  if(isSingle){
    // 单人模式：聚合全部板块
    container.className='single-view';
    nav.style.display='none';
    let allRows=[];
    
    DATA['板块'].forEach(sec=>{
      let rows=sec['数据'].filter(r=>r.name===currentPerson);
      if(rows.length===0) return;
      
      // 按板块分组
      if(sec.need_daily){
        // 单指标到天
        rows.forEach(r=>{
          allRows.push({...r,section:sec['板块']});
        });
      }else{
        // 多指标月度
        rows.forEach(r=>{
          allRows.push({...r,section:sec['板块']});
        });
      }
    });
    
    // 按板块分组渲染
    const grouped={};
    allRows.forEach(r=>{
      if(!grouped[r.section]) grouped[r.section]=[];
      grouped[r.section].push(r);
    });
    
    let h='<div class="single-view">';
    Object.keys(grouped).forEach(secName=>{
      const rows=grouped[secName];
      const hasDaily=rows.some(r=>r.daily&&r.daily.length>0);
      h+='<div class="section-block"><h3>'+secName+'</h3><table><thead><tr><th>人员</th><th>指标</th><th>目标</th><th>月度达成</th><th>达成率</th>';
      if(hasDaily){
        const sample=rows.find(r=>r.daily&&r.daily.length>0);
        if(sample){
          sample.daily.forEach(d=>{
            h+='<th>'+d[0].slice(5)+'</th>';
          });
        }
      }
      h+='</tr></thead><tbody>';
      
      rows.forEach(r=>{
        const cls=r.ok?'row-ok':(r.monthly===null||r.monthly===undefined)?'row-none':'row-warn';
        h+='<tr class="'+cls+'">';
        h+='<td class="col-name">'+r.name+'</td>';
        h+='<td class="col-indicator">'+(r.indicator||'-')+'</td>';
        h+='<td class="col-target">'+(r.target||'-')+'</td>';
        h+='<td class="col-monthly">'+fmt(r.monthly)+'</td>';
        // 进度条
        const pct=r.pct||0;
        const barCls=r.ok?'progress-ok':'progress-warn';
        h+='<td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill '+barCls+'" style="width:'+pct+'%"></div></div><span class="progress-label">'+pct.toFixed(0)+'%</span></div></td>';
        // 日度
        if(r.daily&&r.daily.length>0){
          r.daily.forEach(d=>{
            const val=d[1], ok=d[2];
            let txt=fmt(val);
            let cls2=val==='-'||val===null||val===undefined?'neutral':(ok?'good':'bad');
            h+='<td><span class="daily-cell daily-'+cls2+'">'+txt+'</span></td>';
          });
        }
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    });
    h+='</div>';
    container.innerHTML=h;
    document.getElementById('rowCount').textContent=allRows.length+' 项指标';
    
  }else{
    // 多板块模式（全部人员）
    container.className='multi-mode';
    nav.style.display='flex';
    
    DATA['板块'].forEach((s,i)=>{
      const b=document.createElement('button');
      b.textContent=s['板块'];
      b.className=i===currentSection?'active':'';
      b.onclick=()=>{currentSection=i;render();};
      nav.appendChild(b);
    });
    
    const sec=DATA['板块'][currentSection];
    let rows=sec['数据'];
    
    // 按人去重（多指标板块每人有多行，需要聚合显示）
    const dailyDays=sec.need_daily&&rows.length>0&&rows[0].daily?rows[0].daily.length:0;
    
    let h='<div class="section-block active"><h3>'+sec['板块']+'</h3><div style="font-size:11px;color:#888;margin-bottom:8px">目标: '+sec['目标']+'</div>';
    h+='<table><thead><tr><th>人员</th><th>指标</th><th>目标</th><th>月度达成</th><th>达成率</th>';
    for(let i=0;i<dailyDays;i++){
      h+='<th>'+rows[0].daily[i][0].slice(5)+'</th>';
    }
    h+='</tr></thead><tbody>';
    
    rows.forEach(r=>{
      const cls=r.ok?'row-ok':(r.monthly===null||r.monthly===undefined)?'row-none':'row-warn';
      const pct=r.pct||0;
      const barCls=r.ok?'progress-ok':'progress-warn';
      h+='<tr class="'+cls+'">';
      h+='<td class="col-name">'+r.name+'</td>';
      h+='<td class="col-indicator">'+(r.indicator||'-')+'</td>';
      h+='<td class="col-target">'+(r.target||'-')+'</td>';
      h+='<td class="col-monthly">'+fmt(r.monthly)+'</td>';
      h+='<td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill '+barCls+'" style="width:'+pct+'%"></div></div><span class="progress-label">'+pct.toFixed(0)+'%</span></div></td>';
      if(r.daily){
        r.daily.forEach(d=>{
          const val=d[1], ok=d[2];
          let txt=fmt(val);
          let cls2=val==='-'||val===null||val===undefined?'neutral':(ok?'good':'bad');
          h+='<td><span class="daily-cell daily-'+cls2+'">'+txt+'</span></td>';
        });
      }else{
        for(let i=0;i<dailyDays;i++) h+='<td><span class="daily-cell daily-neutral">-</span></td>';
      }
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    container.innerHTML=h;
    document.getElementById('rowCount').textContent=rows.length+' 行';
  }
}

function init(){
  const sel=document.getElementById('personFilter');
  DATA['人员列表'].forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;sel.appendChild(o);});
  sel.onchange=()=>{currentPerson=sel.value;render();};
  render();
}
init();
</script>
</body>
</html>
