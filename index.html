<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans SC',sans-serif;background:#f0f2f5;color:#333;font-size:13px}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:16px 24px;position:sticky;top:0;z-index:200}
.header h1{font-size:18px;font-weight:600}
.header .sub{font-size:12px;opacity:.7;margin-top:2px}
.controls{background:#fff;padding:10px 24px;border-bottom:1px solid #e0e0e0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:55px;z-index:190}
.controls label{font-size:12px;font-weight:500;color:#555}
.controls select{padding:5px 8px;border:1px solid #d0d0d0;border-radius:5px;font-size:12px}
.controls .info{font-size:11px;color:#888;margin-left:8px}
.section-nav{background:#fff;padding:6px 24px;display:flex;gap:4px;flex-wrap:wrap;position:sticky;top:90px;z-index:180}
.section-nav button{padding:4px 10px;border:1px solid #d0d0d0;border-radius:12px;background:#fff;font-size:10px;cursor:pointer;white-space:nowrap}
.section-nav button:hover{border-color:#3949ab;color:#3949ab}
.section-nav button.active{background:#3949ab;color:#fff;border-color:#3949ab}
.content{padding:12px 24px 40px;overflow-x:auto}

/* 表格 */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06)}
th{background:#f0f2f8;padding:7px 8px;font-size:11px;font-weight:600;color:#444;text-align:left;border-bottom:2px solid #e0e0e0;white-space:nowrap;position:sticky;top:130px;z-index:100}
td{padding:7px 8px;font-size:12px;border-bottom:1px solid #f0f0f0;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#f8f9ff}
.row-ok td:first-child{border-left:3px solid #43a047}
.row-warn td:first-child{border-left:3px solid #e65100}
.row-none td:first-child{border-left:3px solid #bbb}
.col-name{font-weight:500}
.col-monthly{font-weight:500}

/* 进度条 */
.progress-wrap{display:inline-flex;align-items:center;gap:6px}
.progress-bar{width:60px;height:10px;background:#eee;border-radius:5px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;border-radius:5px;transition:width .3s}
.progress-ok{background:#43a047}
.progress-warn{background:#e65100}
.progress-none{background:#bbb}
.progress-label{font-size:10px;color:#666;white-space:nowrap}

/* 日度单元格 */
.daily-wrap{display:flex;gap:3px;flex-wrap:nowrap}
.daily-cell{padding:2px 5px;border-radius:3px;font-size:10px;min-width:38px;text-align:center}
.daily-good{background:#e8f5e9;color:#2e7d32}
.daily-bad{background:#ffebee;color:#c62828}
.daily-neutral{background:#f5f5f5;color:#999}

/* 单人模式 */
.single-view .section-block{margin-bottom:12px;background:#fff;border-radius:6px;padding:10px 14px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.single-view .section-block h3{font-size:13px;color:#1a237e;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}

/* 重庆卡片视图 */
.cq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:10px}
.cq-card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s}
.cq-card:hover{transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
.cq-card .name{font-weight:600;font-size:13px;color:#1a237e}
.cq-card .count{font-size:20px;font-weight:700;margin:4px 0}
.cq-card .count-red{color:#c62828}
.cq-card .count-orange{color:#e65100}
.cq-card .count-green{color:#2e7d32}
.cq-card .details{font-size:10px;color:#888;margin-top:4px;line-height:1.4}
.cq-card .bar-mini{height:4px;border-radius:2px;margin-top:6px}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:20px;max-width:90vw;max-height:80vh;overflow-y:auto;z-index:1000;box-shadow:0 10px 40px rgba(0,0,0,.2);min-width:400px}
.modal h2{font-size:16px;color:#1a237e;margin-bottom:12px;border-bottom:2px solid #e8eaf6;padding-bottom:6px}
.modal-close{float:right;cursor:pointer;font-size:20px;color:#888;border:none;background:transparent;line-height:1}
.modal-close:hover{color:#333}
.modal table td{padding:6px 10px;font-size:12px}
.modal table tr:nth-child(even){background:#fafafa}

/* 状态 */
.status{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
.status-ok{background:#e8f5e9;color:#2e7d32}
.status-bad{background:#ffebee;color:#c62828}

@media(max-width:768px){
.header,.controls,.section-nav,.content{padding-left:12px;padding-right:12px}
.cq-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.modal{min-width:auto}
}
</style>
</head>

  if(typeof v==='number') {
    if(Math.abs(v)<1 && v!==0) return (v*100).toFixed(1)+'%';
    return Number.isInteger(v)?v:v.toFixed(2);
  }
  return v;
}

function pctCls(v) {
  if(v===null||v===undefined) return 'pct-none';
  if(v>=95) return 'pct-good';
  if(v>=60) return 'pct-mid';
  return 'pct-bad';
}

function barCls(v) {
  if(v===null||v===undefined) return 'progress-none';
  if(v>=95) return 'progress-ok';
  if(v>=60) return 'progress-warn';
  return 'progress-ok'; // same for very bad
}

function openModal(personName) {
  let s = DATA.人员列表.indexOf(personName);
  let parts = [];
  DATA.板块.forEach(sec => {
    let d = sec.数据.find(r => r.name === personName);
    if(d && !d.ok) {
      parts.push('<tr><td>'+sec.板块+'</td><td>'+fmt(d.monthly)+'</td><td>'+(d.target||'-')+'</td><td><span class="status status-bad">✗</span></td></tr>');
    } else if(d) {
      parts.push('<tr><td>'+sec.板块+'</td><td>'+fmt(d.monthly)+'</td><td>'+(d.target||'-')+'</td><td><span class="status status-ok">✓</span></td></tr>');
    }
  });
  document.getElementById('modalContent').innerHTML = '<h2>'+personName+' - 全部指标</h2><table><tr><th>指标</th><th>月度值</th><th>目标</th><th>状态</th></tr>'+parts.join('')+'</table>';
  document.getElementById('modalOverlay').style.display='block';
  document.getElementById('modal').style.display='block';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display='none';
  document.getElementById('modal').style.display='none';
}

function showCqView() {
  currentPerson = '__cq';
  currentSection = -1;
  render();
}

function render() {
  let c = document.getElementById('content');
  let nav = document.getElementById('sectionNav');
  let info = document.getElementById('rowCount');
  let filter = document.getElementById('personFilter').value;
  
  // If cq view
  if(currentPerson === '__cq') {
    nav.innerHTML = '<button onclick="currentSection=-1;render();" class="active">📊 综合</button>';
    c.innerHTML = '';
    info.textContent = '重庆区域总览';
    
    // Find 重庆区域 data (sum up)
    // Actually collect all people and show cards
    let people = DATA.人员列表.filter(p => !['企微回复及时率','月达成','重庆区域'].includes(p));
    
    // Build card for each person: count how many bad indicators
    let cards = people.map(name => {
      let badCount = 0;
      let totalCount = 0;
      DATA.板块.forEach(sec => {
        let d = sec.数据.find(r => r.name === name);
        if(d) {
          totalCount++;
          if(!d.ok) badCount++;
        }
      });
      return {name, badCount, totalCount};
    });
    cards.sort((a,b) => b.badCount - a.badCount);
    
    let totalBad = cards.reduce((s,c) => s + c.badCount, 0) + '项异常';
    info.textContent = cards.length + '人 · ' + totalBad + '项异常';
    
    let h = '<div class="cq-grid">';
    cards.forEach(card => {
      let cls = card.badCount >= 10 ? 'count-red' : (card.badCount >= 5 ? 'count-orange' : 'count-green');
      let barColor = card.badCount >= 10 ? '#c62828' : (card.badCount >= 5 ? '#e65100' : '#43a047');
      let barW = Math.min(100, (card.badCount / 20) * 100);
      h += '<div class="cq-card" onclick="openModal(''+card.name+'')">';
      h += '<div class="name">'+card.name+'</div>';
      h += '<div class="count '+cls+'">'+card.badCount+'/'+card.totalCount+'</div>';
      h += '<div class="details">异常指标数</div>';
      h += '<div class="bar-mini" style="width:'+barW+'%;background:'+barColor+'"></div>';
      h += '</div>';
    });
    h += '</div>';
    c.innerHTML = h;
    return;
  }
  
  // Section navigation
  let navHtml = '';
  DATA.板块.forEach((sec, i) => {
    let active = i === currentSection && currentPerson !== '__cq' ? 'active' : '';
    navHtml += '<button class="'+active+'" onclick="currentSection='+i+';currentPerson=document.getElementById(\'personFilter\').value;render();">'+sec.板块+'</button>';
  });
  nav.innerHTML = navHtml;
  
  // Show the active section
  let sec = DATA.板块[currentSection];
  if(!sec) { c.innerHTML=''; return; }
  
  let isSingle = currentPerson !== '__all';
  let data = sec.数据;
  if(isSingle) data = data.filter(r => r.name === currentPerson);
  
  info.textContent = isSingle ? (data.length?'当前人员：'+currentPerson:'') : sec.板块+' · '+data.length+'人';
  
  if(isSingle && data.length>0) {
    // Single person detail view - show all sections
    let allSections = '';
    DATA.板块.forEach(secBlock => {
      let d = secBlock.数据.find(r => r.name === currentPerson);
      if(!d) return;
      let pct = d.pct!==undefined ? d.pct : (d.monthly ? d.monthly * 100 : 0);
      let pctClass = pctCls(pct);
      
      let hh = '<div class="section-block"><h3>'+secBlock.板块+' <span style="font-size:11px;color:#999">目标：'+(secBlock.目标||'-')+'</span></h3><table>';
      hh += '<tr><td class="col-name">月度值</td><td class="col-monthly">'+fmt(d.monthly)+'</td>';
      hh += '<td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill '+barCls(pct)+'" style="width:'+Math.min(pct,100)+'%"></div></div><span class="progress-label">'+pct.toFixed(1)+'%</span></div></td></tr>';
      if(d.daily && d.daily.length > 0) {
        hh += '<tr><td>日度数据</td><td colspan="2"><div class="daily-wrap">';
        d.daily.forEach((day, i) => {
          if(i > 14) return; // limit to 15 days
          let v = day[1];
          let ok = day[2];
          let cls = ok ? 'daily-good' : 'daily-bad';
          let val = typeof v === 'number' ? (v*100).toFixed(1)+'%' : (v||'-');
          hh += '<div class="daily-cell '+cls+'" title="'+day[0]+'">'+day[0].slice(5)+'<br>'+val+'</div>';
        });
        hh += '</div></td></tr>';
      }
      hh += '<tr><td>状态</td><td colspan="2"><span class="status '+(d.ok?'status-ok':'status-bad')+'">'+(d.ok?'✓ 达标':'✗ 异常')+'</span></td></tr>';
      hh += '</table></div>';
      allSections += hh;
    });
    
    c.innerHTML = '<div class="single-view">'+allSections+'</div>';
    return;
  }
  
  // Multi-person table view
  let hasDaily = data.some(r => r.daily && r.daily.length > 0);
  let hh = '<table><thead><tr><th>姓名</th><th>月度值</th><th>进度</th><th>达成率</th><th>状态</th>';
  if(hasDaily) {
    hh += '<th>日度数据';
    if(data[0] && data[0].daily) {
      data[0].daily.slice(0,14).forEach(day => {
        hh += '<span style="margin:0 2px;font-size:9px;color:#999">'+day[0].slice(5)+'</span>';
      });
    }
    hh += '</th>';
  }
  hh += '</tr></thead><tbody>';
  
  data.forEach(r => {
    let pct = r.pct!==undefined ? r.pct : 0;
    let rowCls = r.ok ? 'row-ok' : 'row-warn';
    hh += '<tr class="'+rowCls+'"><td class="col-name">'+r.name+'</td>';
    hh += '<td class="col-monthly">'+fmt(r.monthly)+'</td>';
    hh += '<td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill '+barCls(pct)+'" style="width:'+Math.min(pct,100)+'%"></div></div></div></td>';
    hh += '<td><span class="'+pctCls(pct)+'" style="font-weight:600">'+pct.toFixed(1)+'%</span></td>';
    hh += '<td><span class="status '+(r.ok?'status-ok':'status-bad')+'">'+(r.ok?'✓':'✗')+'</span></td>';
    if(hasDaily && r.daily) {
      hh += '<td><div class="daily-wrap">';
      r.daily.slice(0,14).forEach(day => {
        let v = day[1];
        let ok = day[2];
        let cls = ok ? 'daily-good' : 'daily-bad';
        let val = typeof v === 'number' ? (v*100).toFixed(1)+'%' : (v||'-');
        hh += '<div class="daily-cell '+cls+'" title="'+day[0]+'">'+val+'</div>';
      });
      hh += '</div></td>';
    }
    hh += '</tr>';
  });
  hh += '</tbody></table>';
  
  c.innerHTML = '<div class="multi-mode"><div class="section-block active">'+hh+'</div></div>';
}

// Person filter change
document.getElementById('personFilter').addEventListener('change', function() {
  currentPerson = this.value;
  currentSection = Math.min(currentSection, DATA.板块.length-1);
  if(currentPerson === '__all') currentSection = 0;
  render();
});

// Init
DATA.人员列表.forEach(p => {
  if(['企微回复及时率','月达成','重庆区域'].includes(p)) return;
  let o = document.createElement('option');
  o.value = p;
  o.textContent = p;
  document.getElementById('personFilter').appendChild(o);
});
render();
</script>
</body>
